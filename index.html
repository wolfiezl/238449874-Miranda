<!DOCTYPE html>
<html lang="en">

<head>
    <title>Survey Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <header>
            <h1 id="title">User Satisfaction Survey</h1>
            <p id="description">Please take a few moments to complete this survey.</p>
        </header>
        <form id="survey-form">

            <div class="form-group">
                <label for="name" id="name-label">Name</label>
                <input type="text" name="name" id="name" placeholder="Enter Your Name" required>
            </div>
            <div class="form-group">
                <label for="email" id="email-label">Email</label>
                <input type="email" name="email" id="email" placeholder="Enter Your Email" required>
            </div>
            <div class="form-group">
                <label for="age" id="number-label">Age</label>
                <input type="number" name="age" id="number" min="1" max="99" placeholder="Enter Your Age">
            </div>

            <div class="form-group">
                <label for="satisfaction">How satisfied are you with our product/service?</label>
                <select name="satisfaction" id="dropdown">
                    <option selected disabled value>Select </option>
                    <option value="Very Unsatisfied">Very Unsatisfied</option>
                    <option value="Unsatisfied">Unsatisfied</option>
                    <option value="Neutral">Neutral</option>
                    <option value="Satisfied">Satisfied</option>
                    <option value="Very Satisfied">Very Satisfied</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="rating">Would you recommend our product/service to a friend?</label>
                <div class="radio-group">
                    <input type="radio" name="rating" id="never" value="never"><label for="never"> Never </label>
                </div>
                <div class="radio-group">
                    <input type="radio" name="rating" id="maybe" value="maybe"><label for="maybe"> Maybe </label>
                </div>
                <div class="radio-group">
                    <input type="radio" name="rating" id="likely" value="likely"><label for="likely"> Likely </label>
                </div>
                <div class="radio-group">
                    <input type="radio" name="rating" id="definitely" value="definitely"><label for="definitely">
                        Definitely
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label for="liked">Where did you hear about us?</label>
                <div class="checkbox-group">
                    <input type="checkbox" name="liked" id="website" value="website"><label for="website">
                        <svg class="check-mark-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
                            <polyline class="check-mark-svg-path" points="25.5,53.5 39.5,67.5 72.5,34.5 " />
                        </svg>
                        <span>Website</span>
                    </label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" name="liked" id="social media" value="social media"><label for="social media">
                        <svg class="check-mark-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
                            <polyline class="check-mark-svg-path" points="25.5,53.5 39.5,67.5 72.5,34.5 " />
                        </svg>
                        <span>Social Media</span>
                    </label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" name="liked" id="friends" value="friends"><label for="friends">
                        <svg class="check-mark-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
                            <polyline class="check-mark-svg-path" points="25.5,53.5 39.5,67.5 72.5,34.5 " />
                        </svg>
                        <span>Friends</span>
                    </label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" name="liked" id="others" value="others"><label for="others">
                        <svg class="check-mark-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
                            <polyline class="check-mark-svg-path" points="25.5,53.5 39.5,67.5 72.5,34.5 " />
                        </svg>

                        <span>Others</span>
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label for="remark">Any suggestions to better improve our services?</label>
                <textarea name="remark" id="remark" placeholder="Type here.."></textarea>
            </div>

            <div class="form-group">
                <button id="submit" type="submit">Submit</button>
            </div>
        </form>
    </main>
</body>

</html>
